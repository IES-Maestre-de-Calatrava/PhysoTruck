<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PhysioTrack</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background: url("Niño conduciendo en un camino futurista.png") no-repeat center center fixed;
      background-size: cover;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
    }

    .form-select {
      border-radius: 14px;
      padding: 12px;
      border: none;
    }

    .btn-modern {
      border-radius: 14px;
      padding: 12px;
      font-weight: 600;
      background: linear-gradient(135deg, #4f8cff, #6a5cff);
      border: none;
    }
  </style>
</head>

<body>

<div class="container py-5">

  <div class="text-center text-white mb-4">
    <h1 class="fw-bold">Bienvenido a PhysioTrack</h1>
    <p>Selecciona un paciente para ver su información</p>
  </div>

  <div class="glass-card mx-auto p-4" style="max-width: 600px;">

    <label class="form-label fw-semibold">Selecciona un paciente</label>

    <select id="patientsSelect" class="form-select mb-3">
      <option value="" disabled selected>Cargando pacientes...</option>
    </select>

    <div class="d-grid">
      <button id="goButton" class="btn btn-modern btn-lg text-white" disabled>
        Ver paciente
      </button>
    </div>

  </div>

</div>

<script>
  const API_URL = 'http://localhost:8000';
  const select = document.getElementById('patientsSelect');
  const button = document.getElementById('goButton');

  let selectedPatientId = null;

  async function loadPatients() {
    try {
      const token = localStorage.getItem('token');

      const res = await fetch(`${API_URL}/patients`, {
        headers: token ? { 'Authorization': `Bearer ${token}` } : {}
      });

      if (!res.ok) throw new Error("API error");

      const patients = await res.json();

      select.innerHTML = `<option value="" disabled selected>Elige un paciente...</option>`;

      if (!Array.isArray(patients) || patients.length === 0) {
        select.innerHTML = `<option disabled>No hay pacientes</option>`;
        return;
      }

      patients.forEach(p => {
        const option = document.createElement('option');
        option.value = p.id;
        option.textContent = p.full_name;
        select.appendChild(option);
      });

    } catch (err) {
      console.error("Error cargando pacientes:", err);

      select.innerHTML = `
        <option value="" disabled selected>Error cargando pacientes</option>
        <option value="1">Alonso</option>
        <option value="2">Alberto</option>
      `;
    }
  }

  select.addEventListener('change', () => {
    selectedPatientId = select.value;
    button.disabled = !selectedPatientId;
  });

  button.addEventListener('click', () => {
    if (!selectedPatientId) return;

    const selectedOption = select.options[select.selectedIndex];
    const patientName = selectedOption.textContent.trim();

    if (patientName === "Alonso") {
      window.location.href = "alonso.html";
    }
    else if (patientName === "Alberto") {
      window.location.href = "alberto.html";
    }
    else {
      window.location.href = `/patients/${selectedPatientId}`;
    }
  });

  loadPatients();
</script>

<!--Bootstrap JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
