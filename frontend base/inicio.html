<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhysioTrack - Pacientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/inicio.css">
</head>
<body>
  <header class="pt-header">
    <div class="pt-header-inner">
      <div class="pt-logo">
        <span class="pt-logo-icon">⚕</span>
        PhysioTrack
      </div>
      <div class="pt-header-right">
        <span class="pt-user-badge" id="userBadge">Cargando...</span>
        <button class="pt-logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main class="pt-main">
    <div class="pt-page-title">
      <h1>Selecciona un paciente</h1>
      <p>Haz clic en un carnet para ver el seguimiento del paciente</p>
    </div>

    <div class="pt-search-wrap">
      <span class="pt-search-icon">🔍</span>
      <input
        type="search"
        id="searchInput"
        class="pt-search-input"
        placeholder="Buscar por nombre o diagnóstico..."
        autocomplete="off"
      >
      <span class="pt-search-count" id="searchCount"></span>
    </div>

    <div id="patientsGrid" class="pt-grid">
      <div class="pt-loading">
        <div class="spinner-border text-primary" role="status"></div>
        <span>Cargando pacientes...</span>
      </div>
    </div>

    <p id="msg" class="pt-msg"></p>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/inicio.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
