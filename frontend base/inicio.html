<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhysioTrack - Pacientes</title>
  <link rel="stylesheet" href="css/inicio.css">
</head>
<body>

  <header class="pt-header">
    <div class="pt-header-inner">
      <div class="pt-logo">
        <span class="pt-logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </span>
        PhysioTrack
      </div>
      <div class="pt-header-right">
        <div class="pt-user-info">
          <div class="pt-user-avatar" id="userAvatar">?</div>
          <span class="pt-user-name" id="userBadge">Cargando...</span>
        </div>
        <button class="pt-logout-btn" id="logoutBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </button>
      </div>
    </div>
  </header>

  <div class="pt-hero">
    <div class="pt-hero-inner">
      <div class="pt-hero-text">
        <h1>Mis pacientes</h1>
        <p>Selecciona un paciente para ver su seguimiento y evolución clínica</p>
      </div>
      <button id="openStatsBtn" class="pt-stats-btn" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Abrir dashboard
      </button>
    </div>
  </div>

  <main class="pt-main">

    <div class="pt-search-section">
      <div class="pt-search-wrap">
        <span class="pt-search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          type="search"
          id="searchInput"
          class="pt-search-input"
          placeholder="Nombre, apellidos o DNI..."
          autocomplete="off"
        >
        <span class="pt-search-count" id="searchCount"></span>
        <button class="pt-search-clear" id="clearSearch" aria-label="Limpiar búsqueda">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <p class="pt-search-hint">Busca por nombre, apellidos o número de DNI del paciente</p>
    </div>

    <div id="patientsGrid" class="pt-grid">
      <div class="pt-loading">
        <div class="pt-spinner"></div>
        <span>Cargando pacientes...</span>
      </div>
    </div>

    <p id="msg" class="pt-msg"></p>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/inicio.js"></script>
</body>
</html>
